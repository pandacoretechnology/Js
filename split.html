<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <script>
        const text = "Hello  World"; // Note the two spaces in the middle

        // Using a standard string space:
        console.log(text.split(' '));
        // Output: ['Hello', '', 'World'] <-- Caught an ugly empty string!

        // Using the Regex:
        console.log(text.split(/\s+/));
        // Output: ['Hello', 'World']    <-- Clean and perfect
    </script>
</body>

</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Real-Time Text Analyzer</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 500px;
        }
        h2 {
            margin-top: 0;
            color: #333;
        }
        textarea {
            width: 100%;
            height: 150px;
            padding: 12px;
            box-sizing: border-box;
            border: 2px solid #ccc;
            border-radius: 6px;
            font-size: 16px;
            resize: none;
            outline: none;
            transition: border-color 0.3s;
        }
        textarea:focus {
            border-color: #4CAF50;
        }
        .stats {
            display: flex;
            justify-content: space-between;
            margin-top: 15px;
            font-size: 18px;
            font-weight: bold;
            color: #555;
        }
        .badge {
            background-color: #e3f2fd;
            color: #0d47a1;
            padding: 5px 10px;
            border-radius: 4px;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Real-Time Text Analyzer</h2>
    <p>Type something below to see JavaScript update the DOM in real-time:</p>
    
    <textarea id="textInput" placeholder="Start typing here..."></textarea>
    
    <div class="stats">
        <div>Characters: <span id="charCount" class="badge">0</span></div>
        <div>Words: <span id="wordCount" class="badge">0</span></div>
    </div>
</div>

<script>
    // 1. Select the HTML elements we need to interact with
    const textInput = document.getElementById('textInput');
    const charCount = document.getElementById('charCount');
    const wordCount = document.getElementById('wordCount');

    
    textInput.addEventListener('input', () => {
        const text = textInput.value;
        
        
        charCount.textContent = text.length;
        
        const cleanText = text.trim();
        if (cleanText === '') {
            wordCount.textContent = 0;
        } else {
            // Regex matches one or more space characters
            const words = cleanText.split(/\s+/);
            wordCount.textContent = words.length;
        }
    });
</script>

</body>
</html>

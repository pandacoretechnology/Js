<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>

    <p id="size">Resize the window!</p>

    <script>
        const sizeDisplay = document.getElementById("size");

        window.addEventListener("resize", function () {
            sizeDisplay.textContent = "Width: " + window.innerWidth + "px | Height: " + window.innerHeight + "px";
        });
    </script>
</body>

</html>
